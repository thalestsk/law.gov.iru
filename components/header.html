<!--
    Header component for Law.gov.iru
    
    IMPORTANT: law.gov.iru is a subfolder of the root directory structure.
    This means:
    - Root files (index.html, case-laws.html, etc.) are at: /law.gov.iru/
    - Subdirectory files are at: /law.gov.iru/act-of-estates/, /law.gov.iru/proclamation/, etc.
    - Images are at: /law.gov.iru/images/
    
    For subdirectory pages, we need to use "../" to go up one level to reach root files.
    For root level pages, we use direct paths without "../".
-->
<header class="navbar">
    <div class="container">
        <!-- Logo link - absolute path from root directory -->
        <a href="/law.gov.iru/index.html" class="logo">
            <img src="/law.gov.iru/images/gov-iru-header.png" alt="Law.gov.iru" class="header-image">
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
            <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-links">
            <!-- Navigation links - absolute paths from root directory -->
            <li><a href="/law.gov.iru/index.html" class="active">Legal Database</a></li>
            <li><a href="/law.gov.iru/case-laws.html">Case Laws</a></li>
            <li><a href="/law.gov.iru/explainers.html">Explainers</a></li>
            <li><a href="/law.gov.iru/about.html">About</a></li>
        </ul>
    </div>
</header>

<script>
    // Mobile menu toggle functionality only
    // Note: Using absolute paths from root directory - no dynamic path resolution needed
    setTimeout(function() {
        const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        
        if (mobileMenuToggle && navLinks) {
            mobileMenuToggle.addEventListener('click', function(e) {
                e.preventDefault();
                navLinks.classList.toggle('active');
                const icon = this.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-bars');
                    icon.classList.toggle('fa-times');
                }
            });
        }
    }, 100);
</script>
