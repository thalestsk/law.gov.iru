<script>
    // Fix header links based on current page depth
    (function() {
        const path = window.location.pathname;
        const depth = path.split('/').length - 1;
        let basePath = '';
        
        if (depth > 1) {
            // We're in a subdirectory, need to go up
            basePath = '../'.repeat(depth - 1);
        }
        
        // Update all links with data-link attribute
        document.querySelectorAll('[data-link]').forEach(link => {
            link.href = basePath + link.getAttribute('data-link');
        });
    })();
</script>
